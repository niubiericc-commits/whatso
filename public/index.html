<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerGo · 真人手机德州扑克</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-eyebrow">TEXAS HOLD'EM · ONLINE</div>
      <h1>PokerGo</h1>
    </div>
  </div>
  <div class="card">
    <h2 class="section-title">我是房主</h2>
    <p class="section-sub">创建牌局，生成房间码，邀请朋友用自己的手机加入。你不会看到任何人的底牌，包括你自己（除非你也坐下参与）。</p>
    <a class="btn btn-primary" href="/host.html" style="display:block;text-align:center;text-decoration:none;">创建牌局</a>
  </div>
  <div class="card">
    <h2 class="section-title">我是玩家</h2>
    <p class="section-sub">输入房主给你的房间码和姓名加入，只有你自己能在自己手机上看到你的底牌。</p>
    <a class="btn btn-blue" href="/play.html" style="display:block;text-align:center;text-decoration:none;">加入牌局</a>
  </div>
  <div class="hint-box">
    本页面由独立后端服务器提供，每位玩家的底牌只发送到其本人的连接上，房主与其他玩家均无法读取——不同于纯前端方案，这里是真正的服务器权威发牌。
  </div>
</div>
</body>
</html>
