<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerGo · 房主入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-eyebrow">TEXAS HOLD'EM · HOST</div>
      <h1>PokerGo</h1>
    </div>
  </div>
  <div class="card">
    <h2 class="section-title">创建牌局</h2>
    <p class="section-sub">生成房间码，邀请朋友用自己的手机加入。你不会看到任何人的底牌，包括你自己（除非你也坐下参与）。</p>
    <a class="btn btn-primary" href="/host.html" style="display:block;text-align:center;text-decoration:none;">创建牌局</a>
  </div>
  <div class="hint-box">
    这是房主专用入口。玩家不需要打开这个页面——把房主控制台里生成的邀请链接（或房间码）直接发给玩家，他们用自己的手机打开链接即可加入，不会看到这个创建入口。
  </div>
</div>
</body>
</html>
